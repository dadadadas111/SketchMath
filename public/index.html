<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SketchMath v2</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.geogebra.org/apps/deployggb.js"></script>
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <button id="btn-new-chat" class="btn-new-chat" data-i18n="newChat">+ Trò chuyện mới</button>
      </div>
      <div id="session-list"></div>
    </aside>
    <div id="sidebar-overlay"></div>

    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <button id="btn-sidebar" class="btn-icon" title="Menu">☰</button>
        <h1>SketchMath <span class="version">v2</span></h1>
      </div>
      <div class="header-right">
        <button id="btn-lang" class="btn-icon" title="Switch language">VI</button>
        <button id="btn-theme" class="btn-icon" title="Toggle theme">🌙</button>
      </div>
    </header>

    <!-- Chat panel (full width — no side canvas) -->
    <main id="main">
      <section id="chat-panel">
        <div id="chat-messages">
          <div class="message system">
            <p data-i18n="welcome">Xin chào! Nhập bài toán hình học để bắt đầu. Ví dụ: "Cho tam giác ABC vuông tại A, đường cao AH"</p>
          </div>
        </div>

        <div id="chat-input-area">
          <div id="input-row">
            <textarea id="input-prompt" rows="2" placeholder="Nhập bài toán hình học..." data-i18n-placeholder="inputPlaceholder"></textarea>
            <button id="btn-send" class="btn-primary" data-i18n="send">Gửi</button>
          </div>
        </div>
      </section>
    </main>

    <!-- Status bar -->
    <footer id="status-bar">
      <span id="status-text" data-i18n="ready">Sẵn sàng</span>
      <span id="status-objects"></span>
    </footer>
  </div>

  <!-- Hidden off-screen GeoGebra container for rendering + PNG capture -->
  <div id="ggb-hidden">
    <div id="ggb-element"></div>
    <div id="ggb-loading" class="loading-overlay">
      <div class="spinner"></div>
      <span data-i18n="loadingGeoGebra">Đang tải GeoGebra...</span>
    </div>
  </div>

  <!-- Interactive modal for live GeoGebra interaction -->
  <div id="ggb-modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <span data-i18n="interactiveView">Chế độ tương tác</span>
        <button id="btn-close-modal" class="btn-icon">✕</button>
      </div>
      <div id="ggb-modal-body"></div>
    </div>
  </div>

  <script src="construction-compiler.js"></script>
  <script src="script.js"></script>
</body>
</html>
